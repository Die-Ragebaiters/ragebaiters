<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mediathek | die Ragebaiters</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Styling für das moderne Formular */
    .upload-card {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 30px;
      margin-bottom: 50px;
      box-shadow: var(--shadow);
    }

    .file-drop-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      border: 2px dashed var(--line);
      border-radius: 15px;
      background: var(--panel);
      transition: all 0.3s ease;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .file-drop-area:hover {
      border-color: var(--accent);
      background: rgba(183, 255, 60, 0.05);
    }

    .file-drop-area svg {
      width: 40px; height: 40px; color: var(--accent); margin-bottom: 10px;
    }

    /* Input Felder Styling */
    .input-group { margin-bottom: 15px; }
    .input-group label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .input-style {
      width: 100%;
      padding: 14px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-style:focus { border-color: var(--accent); }

    /* Der Upload Button */
    #uploadBtn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      font-weight: 900;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(183, 255, 60, 0.2);
    }

    #uploadBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(183, 255, 60, 0.5);
    }

    #uploadBtn:disabled { background: var(--muted); opacity: 0.6; cursor: not-allowed; }

    /* Galerie Grid */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .media-card {
      background: var(--bg-soft);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .media-card img { width: 100%; height: 250px; object-fit: cover; }
    .media-info { padding: 20px; }
    .media-info h3 { margin: 0; color: var(--accent); }
    .media-info p { color: var(--muted); margin-top: 5px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="top-banner">
    <img src="images/banner2.png" alt="Banner" />
  </div>

  <header class="container">
    <nav class="nav">
      <div style="font-weight: 900; font-size: 1.6rem;">die Ragebaiters</div>
      <div class="nav-links">
        <a href="index.html">Startseite</a>
        <a href="team.html">Team</a>
        <a class="active" href="mediathek.html">Mediathek</a>
        <a href="impressum.html">Impressum</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="upload-card">
      <h2 style="margin-top: 0; color: var(--accent);">NEUER BEITRAG</h2>
      
      <div class="file-drop-area" id="dropArea">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5-5 5 5m-5-5v12"></path>
        </svg>
        <span id="fileName">Bild auswählen oder reinziehen</span>
        <input type="file" id="fileInput" accept="image/*" style="position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
      </div>

      <div class="input-group">
        <label>Titel</label>
        <input type="text" id="titleInput" class="input-style" placeholder="z.B. Action im CQB">
      </div>
      
      <div class="input-group">
        <label>Beschreibung</label>
        <textarea id="descInput" class="input-style" rows="3" placeholder="Was ist auf dem Bild zu sehen?"></textarea>
      </div>

      <button id="uploadBtn">Beitrag veröffentlichen</button>
    </section>

    <h2>Galerie</h2>
    <div id="gallery" class="media-grid"></div>
  </main>

  <script>
    const SUPABASE_URL = 'https://twrzklmtwouwqkrpnrpw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_HovuOnObKX3VOOt8EpN2jw_SGBJ9-7e';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const uploadBtn = document.getElementById('uploadBtn');

    // Dateinamen anzeigen
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        fileNameDisplay.innerText = "Ausgewählt: " + fileInput.files[0].name;
        fileNameDisplay.style.color = "var(--accent)";
      }
    });

    // Galerie laden
    async function loadGallery() {
      const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
      if (error) return;
      document.getElementById('gallery').innerHTML = data.map(item => `
        <div class="media-card">
          <img src="${item.image_url}" alt="Ragebaiters">
          <div class="media-info">
            <h3>${item.title}</h3>
            <p>${item.description || ''}</p>
          </div>
        </div>
      `).join('');
    }

    // Upload Logik
    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      const title = document.getElementById('titleInput').value;
      const desc = document.getElementById('descInput').value;

      if (!file || !title) return alert("Bitte Bild und Titel eingeben!");

      uploadBtn.disabled = true;
      uploadBtn.innerText = "Lädt hoch...";

      const fName = `${Date.now()}_${file.name}`;
      const { error: sErr } = await supabase.storage.from('images').upload(fName, file);

      if (sErr) {
        alert("Fehler beim Hochladen des Bildes!");
        uploadBtn.disabled = false;
        return;
      }

      const { data: urlData } = supabase.storage.from('images').getPublicUrl(fName);
      
      const { error: dbError } = await supabase.from('posts').insert([{ 
        title, 
        description: desc, 
        image_url: urlData.publicUrl 
      }]);

      if (dbError) {
        alert("Fehler beim Speichern der Texte!");
        uploadBtn.disabled = false;
      } else {
        location.reload();
      }
    });

    loadGallery();
  </script>
</body>
</html>
